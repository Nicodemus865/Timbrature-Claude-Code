name: automated-checks

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-test.txt -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Resolve base SHA
        id: base
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            base_sha="$(git merge-base HEAD "origin/${{ github.base_ref }}")"
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            base_sha="${{ github.event.before }}"
          else
            git fetch origin "${{ github.event.repository.default_branch }}" --depth=1
            base_sha="$(git merge-base HEAD "origin/${{ github.event.repository.default_branch }}")"
          fi
          echo "base_sha=$base_sha" >> "$GITHUB_OUTPUT"

      - name: Build check plan
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          python tools/checks.py ci --base-sha "${{ steps.base.outputs.base_sha }}" --json > check-plan.json
          python - <<'PY'
          import json
          import os

          with open("check-plan.json", encoding="utf-8") as handle:
              plan = json.load(handle)

          needs_playwright = bool(plan.get("requires_playwright"))
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"needs_playwright={'true' if needs_playwright else 'false'}\n")
          PY

      - name: Install Playwright browsers
        if: steps.plan.outputs.needs_playwright == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Run checks
        run: python tools/checks.py ci --base-sha "${{ steps.base.outputs.base_sha }}"
